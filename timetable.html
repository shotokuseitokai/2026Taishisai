<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>タイムテーブル | 文化祭2026</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=RocknRoll+One&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="logo"><a href="index.html">文化祭2026</a></div>
        <nav id="nav-menu">
            <ul>
                <li><a href="index.html">トップ</a></li>
                <li><a href="projects.html">企画一覧</a></li>
                <li><a href="timetable.html" class="active">タイムテーブル</a></li>
            </ul>
        </nav>
        <div class="hamburger" id="hamburger">
            <span></span>
            <span></span>
            <span></span>
        </div>
    </header>

    <div class="page-header">
        <h1>TIMETABLE</h1>
        <p>ステージ スケジュール</p>
    </div>

    <div class="container">
        <div class="timetable-container">
            
            <div class="tab-buttons">
                <button class="tab-btn active" data-target="day1">1日目 (9/19)</button>
                <button class="tab-btn" data-target="day2">2日目 (9/20)</button>
            </div>

            <div id="day1" class="timetable-content active">
    <div class="scroll-instruction">※表は横にスクロールできます 👉</div>
    
    <div class="timetable-matrix-wrapper">
        <div class="timetable-matrix">
            
            <div class="time-col">
                <div class="matrix-header"></div>
                <div class="time-slot">10:00</div>
                <div class="time-slot">11:00</div>
                <div class="time-slot">12:00</div>
                <div class="time-slot">13:00</div>
                <div class="time-slot">14:00</div>
            </div>

            <div class="location-col pink-bg">
                <div class="matrix-header">講堂</div>
                <div class="matrix-card" style="margin-top: 20px; height: 100px;">
                    <div class="m-time">10:00〜11:20</div>
                    <div class="m-title">Opening Festival!</div>
                </div>
                <div class="matrix-card" style="margin-top: 40px; height: 80px;">
                    <div class="m-time">11:40〜13:20</div>
                    <div class="m-title">吹奏楽部コンサート</div>
                </div>
            </div>

            <div class="location-col blue-bg">
                <div class="matrix-header">校庭</div>
                <div class="matrix-card" style="margin-top: 20px; height: 80px;">
                    <div class="m-time">10:00〜11:30</div>
                    <div class="m-title">大学対抗クイズバトル</div>
                </div>
            </div>

            <div class="location-col pink-bg">
                <div class="matrix-header">90thホール</div>
                <div class="matrix-card" style="margin-top: 80px; height: 60px;">
                    <div class="m-time">11:15〜11:35</div>
                    <div class="m-title">アンサンブルステージ</div>
                </div>
                <div class="matrix-card" style="margin-top: 10px; height: 50px;">
                    <div class="m-time">11:50〜12:00</div>
                    <div class="m-title">書道パフォーマンス</div>
                </div>
            </div>

            <div class="location-col blue-bg">
                <div class="matrix-header">Music Lab</div>
                <div class="matrix-card" style="margin-top: 40px; height: 150px;">
                    <div class="m-time">10:30〜13:00</div>
                    <div class="m-title">軽音楽部 ぶっ通しライブ</div>
                </div>
            </div>

        </div>
    </div>
</div>
            
    <footer>
        <div class="sns-links">
            </div>
        <p>&copy; 2026 文化祭実行委員会</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
